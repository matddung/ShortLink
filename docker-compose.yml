services:
  postgres:
    image: postgres:17
    container_name: shortlink-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shortlink}
      POSTGRES_USER: ${POSTGRES_USER:-shortlink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shortlink}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortlink -d shortlink"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: shortlink-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Single-node Kafka (dev/toy usage)
  kafka:
    image: bitnami/kafka:3.7
    container_name: shortlink-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: shortlink-api
    environment:
      SPRING_PROFILES_ACTIVE: api
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/shortlink}
      DB_USERNAME: ${DB_USERNAME:-shortlink}
      DB_PASSWORD: ${DB_PASSWORD:-shortlink}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-3600000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-1209600000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://qwe123.shop}
      APP_AUTH_SECURE_COOKIE: ${APP_AUTH_SECURE_COOKIE:-true}
      APP_AUTH_SAME_SITE: ${APP_AUTH_SAME_SITE:-None}
      APP_AUTH_COOKIE_DOMAIN: ${APP_AUTH_COOKIE_DOMAIN:-.qwe123.shop}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
    ports:
      - "8080:8080"

  consumer:
    build:
      context: ./backend
    container_name: shortlink-consumer
    environment:
      SPRING_PROFILES_ACTIVE: consumer
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/shortlink}
      DB_USERNAME: ${DB_USERNAME:-shortlink}
      DB_PASSWORD: ${DB_PASSWORD:-shortlink}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-3600000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-1209600000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://qwe123.shop}
      APP_AUTH_SECURE_COOKIE: ${APP_AUTH_SECURE_COOKIE:-true}
      APP_AUTH_SAME_SITE: ${APP_AUTH_SAME_SITE:-None}
      APP_AUTH_COOKIE_DOMAIN: ${APP_AUTH_COOKIE_DOMAIN:-.qwe123.shop}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://qwe123.shop/api}
    container_name: shortlink-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://qwe123.shop/api}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 15

  nginx:
    image: nginx:1.27-alpine
    container_name: shortlink-nginx
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: shortlink-node-exporter
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: shortlink-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: shortlink-alertmanager
    volumes:
      - ./ops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: shortlink-prometheus
    environment:
      API_METRICS_TARGET: ${API_METRICS_TARGET:-api:8080}
      CONSUMER_METRICS_TARGET: ${CONSUMER_METRICS_TARGET:-consumer:8081}
      NODE_EXPORTER_TARGET: ${NODE_EXPORTER_TARGET:-node-exporter:9100}
      CADVISOR_TARGET: ${CADVISOR_TARGET:-cadvisor:8080}
      ALERTMANAGER_TARGET: ${ALERTMANAGER_TARGET:-alertmanager:9093}
    volumes:
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - /bin/sh
      - -ec
      - |
        cat > /etc/prometheus/prometheus.yml <<PROM
        global:
          scrape_interval: 15s
          evaluation_interval: 15s

        rule_files:
          - /etc/prometheus/alerts.yml

        alerting:
          alertmanagers:
            - static_configs:
                - targets: ['${ALERTMANAGER_TARGET}']

        scrape_configs:
          - job_name: 'api'
            metrics_path: /actuator/prometheus
            static_configs:
              - targets: ['${API_METRICS_TARGET}']

          - job_name: 'consumer'
            metrics_path: /actuator/prometheus
            static_configs:
              - targets: ['${CONSUMER_METRICS_TARGET}']

          - job_name: 'node_exporter'
            static_configs:
              - targets: ['${NODE_EXPORTER_TARGET}']

          - job_name: 'cadvisor'
            static_configs:
              - targets: ['${CADVISOR_TARGET}']
        PROM
        /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus
    depends_on:
      api:
        condition: service_healthy
      consumer:
        condition: service_healthy
      alertmanager:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.2
    container_name: shortlink-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_HTTP_PORT: 3000
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3001:3000"

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:
  alertmanager_data: