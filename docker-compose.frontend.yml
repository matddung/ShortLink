services:
  frontend:
    image: 01055861376/shortlink-frontend:latest
    container_name: shortlink-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 15

  nginx:
    image: nginx:1.27-alpine
    container_name: shortlink-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"