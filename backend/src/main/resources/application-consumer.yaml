server:
  port: 8081

spring:
  application:
    name: shortlink-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: shortlink-click-analytics
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 500ms
      timeout: 500ms

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:86400}

app:
  role: consumer
  auth:
    secure-cookie: false
    same-site: Lax
  cors:
    allowed-origins: http://localhost:3000
  analytics:
    kafka:
      producer-enabled: false
      consumer-enabled: true
      topic: shortlink.redirect.click.v1
  redirect-cache:
    ttl-seconds: 300
    negative-ttl-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
      role: ${app.role}