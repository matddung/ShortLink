server:
  port: 8081

spring:
  application:
    name: shortlink-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: shortlink-click-analytics
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      connect-timeout: 500ms
      timeout: 500ms

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:86400}

app:
  role: consumer
  base-url: https://qwe123.shop
  auth:
    secure-cookie: ${APP_AUTH_SECURE_COOKIE:false}
    same-site: ${APP_AUTH_SAME_SITE:Lax}
    cookie-domain: ${APP_AUTH_COOKIE_DOMAIN:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  analytics:
    kafka:
      producer-enabled: false
      consumer-enabled: true
      topic: shortlink.redirect.click.v1
  redirect-cache:
    ttl-seconds: 300
    negative-ttl-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
      role: ${app.role}