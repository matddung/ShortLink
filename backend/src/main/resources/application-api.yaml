server:
  port: 8080

spring:
  application:
    name: shortlink-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      properties:
        max.block.ms: 300
        request.timeout.ms: 1000
        delivery.timeout.ms: 2000
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      connect-timeout: 500ms
      timeout: 500ms

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:86400}

app:
  role: api
  auth:
    secure-cookie: ${APP_AUTH_SECURE_COOKIE:false}
    same-site: ${APP_AUTH_SAME_SITE:Lax}
    cookie-domain: ${APP_AUTH_COOKIE_DOMAIN:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  analytics:
    kafka:
      producer-enabled: true
      consumer-enabled: false
      topic: shortlink.redirect.click.v1
  redirect-cache:
    ttl-seconds: 300
    negative-ttl-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
      role: ${app.role}
    distribution:
      percentiles-histogram:
        shortlink.api.redirect.latency: true
      percentiles:
        shortlink.api.redirect.latency: 0.5,0.95,0.99