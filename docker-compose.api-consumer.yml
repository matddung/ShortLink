services:
  consumer:
    image: 01055861376/shortlink-backend:1.0.0
    container_name: shortlink-consumer
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: consumer
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      REDIS_HOST: ${REDIS_HOST:?set REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-3600000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-1209600000}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081"]
      interval: 15s
      timeout: 5s
      retries: 20
    ports:
      - "8081:8081"

  api:
    image: 01055861376/shortlink-backend:1.0.0
    container_name: shortlink-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: api
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      REDIS_HOST: ${REDIS_HOST:?set REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-3600000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-1209600000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://qwe123.shop}
      APP_AUTH_SECURE_COOKIE: ${APP_AUTH_SECURE_COOKIE:-true}
      APP_AUTH_SAME_SITE: ${APP_AUTH_SAME_SITE:-None}
      APP_AUTH_COOKIE_DOMAIN: ${APP_AUTH_COOKIE_DOMAIN:-.qwe123.shop}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080"]
      interval: 15s
      timeout: 5s
      retries: 20
    ports:
      - "8080:8080"