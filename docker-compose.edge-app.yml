services:
  api:
    image: 01055861376/shortlink-backend:latest
    container_name: shortlink-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: api
      DB_URL: ${DB_URL:?set DB_URL for shared database}
      DB_USERNAME: ${DB_USERNAME:?set DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:?set KAFKA_BOOTSTRAP_SERVERS}
      REDIS_HOST: ${REDIS_HOST:?set REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-3600000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-1209600000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://qwe123.shop}
      APP_AUTH_SECURE_COOKIE: ${APP_AUTH_SECURE_COOKIE:-true}
      APP_AUTH_SAME_SITE: ${APP_AUTH_SAME_SITE:-None}
      APP_AUTH_COOKIE_DOMAIN: ${APP_AUTH_COOKIE_DOMAIN:-.qwe123.shop}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
    ports:
      - "8080:8080"

  frontend:
    image: 01055861376/shortlink-frontend:latest
    container_name: shortlink-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.qwe123.shop/api}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 15

  nginx:
    image: nginx:1.27-alpine
    container_name: shortlink-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"