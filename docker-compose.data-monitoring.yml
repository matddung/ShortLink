services:
  postgres:
    image: postgres:17
    container_name: shortlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shortlink}
      POSTGRES_USER: ${POSTGRES_USER:-shortlink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shortlink} -d ${POSTGRES_DB:-shortlink}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: shortlink-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.7
    container_name: shortlink-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_ADVERTISED_HOST:?set KAFKA_ADVERTISED_HOST to infra private IP or DNS}:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    ports:
      - "9092:9092"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: shortlink-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: shortlink-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8088:8080"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: shortlink-alertmanager
    restart: unless-stopped
    volumes:
      - ./ops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: shortlink-prometheus
    restart: unless-stopped
    environment:
      API_METRICS_TARGET: ${API_METRICS_TARGET:?set API_METRICS_TARGET (ex. <app-ec2-private-ip>:8080)}
      CONSUMER_METRICS_TARGET: ${CONSUMER_METRICS_TARGET:?set CONSUMER_METRICS_TARGET (ex. <app-ec2-private-ip>:8081)}
      NODE_EXPORTER_TARGET: ${NODE_EXPORTER_TARGET:-node-exporter:9100}
      CADVISOR_TARGET: ${CADVISOR_TARGET:-cadvisor:8080}
      ALERTMANAGER_TARGET: ${ALERTMANAGER_TARGET:-alertmanager:9093}
    volumes:
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - /bin/sh
      - -ec
      - |
        cat > /etc/prometheus/prometheus.yml <<PROM
        global:
          scrape_interval: 15s
          evaluation_interval: 15s

        rule_files:
          - /etc/prometheus/alerts.yml

        alerting:
          alertmanagers:
            - static_configs:
                - targets: ['${ALERTMANAGER_TARGET}']

        scrape_configs:
          - job_name: 'api'
            metrics_path: /actuator/prometheus
            static_configs:
              - targets: ['${API_METRICS_TARGET}']

          - job_name: 'consumer'
            metrics_path: /actuator/prometheus
            static_configs:
              - targets: ['${CONSUMER_METRICS_TARGET}']

          - job_name: 'node_exporter'
            static_configs:
              - targets: ['${NODE_EXPORTER_TARGET}']

          - job_name: 'cadvisor'
            static_configs:
              - targets: ['${CADVISOR_TARGET}']
        PROM
        /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus
    depends_on:
      alertmanager:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.2
    container_name: shortlink-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?set in environment}
      GF_SERVER_HTTP_PORT: 3000
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3001:3000"

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:
  alertmanager_data: