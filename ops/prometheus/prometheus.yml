global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'api'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['172.31.76.8:8080']

  - job_name: 'consumer'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['172.31.76.8:8081']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']