groups:
  - name: service-health
    rules:
      - alert: ApiInstanceDown
        expr: up{job="api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API instance down"
          description: "API metrics endpoint is not reachable for more than 2 minutes."

      - alert: ConsumerInstanceDown
        expr: up{job="consumer"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Consumer instance down"
          description: "Consumer metrics endpoint is not reachable for more than 2 minutes."

      - alert: NodeExporterDown
        expr: up{job="node_exporter"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Node exporter down"
          description: "Node exporter is unreachable."